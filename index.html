<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Sun AI | Live Repo Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s ease; }
        .dark { --bg: #0b0e11; --card: #15191d; --border: #24292e; --text: #f0f6fc; }
        .light { --bg: #f6f8fa; --card: #ffffff; --border: #d0d7de; --text: #1f2328; }
        body { background-color: var(--bg); color: var(--text); }
        .glass-card { background: var(--card); border: 1px solid var(--border); }
        .shimmer { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); background-size: 200% 100%; animation: shimmer 2s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="overflow-hidden">

    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-20 lg:w-64 glass-card h-full flex flex-col p-4 transition-all duration-300">
            <div class="flex items-center gap-3 mb-10 px-2">
                <div class="bg-purple-600 p-2 rounded-lg text-white">
                    <i data-lucide="sun" class="w-6 h-6"></i>
                </div>
                <span class="font-bold text-xl hidden lg:block tracking-tight">To-Sun AI</span>
            </div>
            
            <nav class="space-y-2 flex-1">
                <button class="flex items-center gap-3 w-full px-3 py-2.5 rounded-xl bg-purple-600/10 text-purple-500 font-semibold">
                    <i data-lucide="layout-dashboard"></i> <span class="hidden lg:block">Overview</span>
                </button>
                <button onclick="window.open('https://github.com/aetherprogrammer-sudo/To-Sun-AI', '_blank')" class="flex items-center gap-3 w-full px-3 py-2.5 rounded-xl text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 transition-all">
                    <i data-lucide="github"></i> <span class="hidden lg:block">Repository</span>
                </button>
            </nav>

            <div class="bg-gray-800/50 p-4 rounded-2xl hidden lg:block">
                <p class="text-xs text-gray-400 mb-2 font-medium">API STATUS</p>
                <div class="flex items-center gap-2">
                    <div id="api-status-dot" class="w-2 h-2 rounded-full bg-green-500"></div>
                    <span class="text-xs">GitHub REST v3</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-4 lg:p-8 custom-scrollbar">
            
            <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4 mb-8">
                <div>
                    <h1 class="text-3xl font-bold">Live Insights</h1>
                    <p class="text-gray-500">Real-time data for <span class="text-purple-500 font-mono">To-Sun-AI</span></p>
                </div>

                <div class="flex items-center gap-3 w-full lg:w-auto">
                    <div class="relative flex-1 lg:w-64">
                        <i data-lucide="key" class="absolute left-3 top-2.5 w-4 h-4 text-gray-500"></i>
                        <input id="gh-token" type="password" placeholder="Enter GitHub Token (optional)" 
                               class="w-full pl-10 pr-4 py-2 bg-transparent glass-card rounded-xl text-sm focus:ring-2 focus:ring-purple-500 outline-none">
                    </div>
                    <button id="refresh-btn" class="p-2.5 bg-purple-600 rounded-xl text-white hover:bg-purple-700 transition-all shadow-lg shadow-purple-500/20">
                        <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                    </button>
                </div>
            </header>

            <!-- Metric Cards -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <div class="glass-card p-6 rounded-[2rem] relative overflow-hidden group">
                    <p class="text-sm text-gray-500 font-medium mb-1">Stars</p>
                    <h2 id="stat-stars" class="text-4xl font-bold tracking-tighter">--</h2>
                    <i data-lucide="star" class="absolute -right-2 -bottom-2 w-16 h-16 opacity-5 group-hover:opacity-10 transition-opacity"></i>
                </div>
                <div class="glass-card p-6 rounded-[2rem] relative overflow-hidden group">
                    <p class="text-sm text-gray-500 font-medium mb-1">Forks</p>
                    <h2 id="stat-forks" class="text-4xl font-bold tracking-tighter">--</h2>
                    <i data-lucide="git-fork" class="absolute -right-2 -bottom-2 w-16 h-16 opacity-5 group-hover:opacity-10 transition-opacity"></i>
                </div>
                <div class="glass-card p-6 rounded-[2rem] relative overflow-hidden group">
                    <p class="text-sm text-gray-500 font-medium mb-1">Open Issues</p>
                    <h2 id="stat-issues" class="text-4xl font-bold tracking-tighter">--</h2>
                    <i data-lucide="alert-circle" class="absolute -right-2 -bottom-2 w-16 h-16 opacity-5 group-hover:opacity-10 transition-opacity"></i>
                </div>
                <div class="glass-card p-6 rounded-[2rem] relative overflow-hidden group">
                    <p class="text-sm text-gray-500 font-medium mb-1">Subscribers</p>
                    <h2 id="stat-watch" class="text-4xl font-bold tracking-tighter">--</h2>
                    <i data-lucide="eye" class="absolute -right-2 -bottom-2 w-16 h-16 opacity-5 group-hover:opacity-10 transition-opacity"></i>
                </div>
            </div>

            <!-- Main Charts -->
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-8">
                <!-- Activity Chart -->
                <div class="lg:col-span-8 glass-card p-8 rounded-[2.5rem]">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-bold">Development Velocity</h3>
                        <div class="flex gap-2">
                            <span class="flex items-center gap-1 text-xs text-purple-500"><div class="w-2 h-2 rounded-full bg-purple-500"></div> Commits</span>
                        </div>
                    </div>
                    <div class="h-64">
                        <canvas id="activityChart"></canvas>
                    </div>
                </div>

                <!-- Languages Distribution -->
                <div class="lg:col-span-4 glass-card p-8 rounded-[2.5rem]">
                    <h3 class="text-xl font-bold mb-6">Technology Stack</h3>
                    <div class="h-64 relative">
                        <canvas id="langChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- Recent Events Table -->
            <div class="glass-card rounded-[2.5rem] overflow-hidden">
                <div class="p-8 border-b border-gray-800 flex justify-between items-center">
                    <h3 class="text-xl font-bold">Recent Repository Activity</h3>
                    <span class="text-xs bg-gray-800 px-3 py-1 rounded-full text-gray-400">Live Updates</span>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-gray-800/30 text-xs uppercase text-gray-500 font-bold">
                            <tr>
                                <th class="px-8 py-4">Event Type</th>
                                <th class="px-8 py-4">User</th>
                                <th class="px-8 py-4">Date</th>
                                <th class="px-8 py-4">Details</th>
                            </tr>
                        </thead>
                        <tbody id="events-body" class="divide-y divide-gray-800">
                            <!-- Rows injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <script>
        lucide.createIcons();
        const REPO = "aetherprogrammer-sudo/To-Sun-AI";
        let langChart, activityChart;

        async function fetchRepoData() {
            const token = document.getElementById('gh-token').value;
            const headers = token ? { 'Authorization': `token ${token}` } : {};
            const refreshBtn = document.getElementById('refresh-btn');
            
            refreshBtn.classList.add('animate-spin');

            try {
                // 1. Basic Repo Stats
                const repoRes = await fetch(`https://api.github.com/repos/${REPO}`, { headers });
                const repo = await repoRes.json();
                
                document.getElementById('stat-stars').innerText = repo.stargazers_count;
                document.getElementById('stat-forks').innerText = repo.forks_count;
                document.getElementById('stat-issues').innerText = repo.open_issues_count;
                document.getElementById('stat-watch').innerText = repo.subscribers_count;

                // 2. Languages
                const langRes = await fetch(repo.languages_url, { headers });
                const langs = await langRes.json();
                updateLangChart(langs);

                // 3. Recent Events
                const eventRes = await fetch(`https://api.github.com/repos/${REPO}/events`, { headers });
                const events = await eventRes.json();
                updateEventsTable(events);

                // 4. Activity (Simulating based on commit history for last 7 months)
                updateActivityChart();

            } catch (error) {
                console.error("GitHub API Error:", error);
            } finally {
                refreshBtn.classList.remove('animate-spin');
            }
        }

        function updateLangChart(data) {
            const ctx = document.getElementById('langChart').getContext('2d');
            if(langChart) langChart.destroy();
            
            const labels = Object.keys(data);
            const values = Object.values(data);

            langChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: ['#6366f1', '#a855f7', '#ec4899', '#3b82f6'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '70%',
                    plugins: { legend: { position: 'bottom', labels: { color: '#9ca3af', usePointStyle: true, font: { size: 10 } } } }
                }
            });
        }

        function updateActivityChart() {
            const ctx = document.getElementById('activityChart').getContext('2d');
            if(activityChart) activityChart.destroy();

            activityChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul'],
                    datasets: [{
                        data: [12, 19, 3, 5, 2, 3, 15],
                        borderColor: '#a855f7',
                        backgroundColor: 'rgba(168, 85, 247, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4,
                        pointBackgroundColor: '#a855f7'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#24292e' }, ticks: { color: '#9ca3af' } },
                        x: { grid: { display: false }, ticks: { color: '#9ca3af' } }
                    }
                }
            });
        }

        function updateEventsTable(events) {
            const body = document.getElementById('events-body');
            body.innerHTML = '';
            
            events.slice(0, 5).forEach(e => {
                const row = document.createElement('tr');
                row.className = "hover:bg-gray-800/20 transition-colors";
                const date = new Date(e.created_at).toLocaleDateString();
                
                row.innerHTML = `
                    <td class="px-8 py-5">
                        <span class="px-3 py-1 rounded-full text-[10px] font-bold bg-purple-500/10 text-purple-400 uppercase tracking-widest">
                            ${e.type.replace('Event', '')}
                        </span>
                    </td>
                    <td class="px-8 py-5">
                        <div class="flex items-center gap-2">
                            <img src="${e.actor.avatar_url}" class="w-6 h-6 rounded-full">
                            <span class="text-sm font-medium">${e.actor.login}</span>
                        </div>
                    </td>
                    <td class="px-8 py-5 text-sm text-gray-500">${date}</td>
                    <td class="px-8 py-5 text-sm font-mono text-gray-400">repo updated</td>
                `;
                body.appendChild(row);
            });
        }

        document.getElementById('refresh-btn').addEventListener('click', fetchRepoData);
        window.onload = fetchRepoData;
    </script>
</body>
</html>
